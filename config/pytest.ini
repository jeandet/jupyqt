[pytest]
python_files =
  test_*.py
addopts =
  --cov
  --cov-config config/coverage.ini
  # fps/anyio leave unclosed sockets and event loops during server teardown;
  # pytest's unraisable handler crashes in tracemalloc, causing RuntimeError
  -p no:unraisableexception
testpaths =
  tests

# action:message_regex:warning_class:module_regex:line
filterwarnings =
  error
  default::EncodingWarning
  error::EncodingWarning:jupyqt
  # TODO: remove once pytest-xdist 4 is released
  ignore:.*rsyncdir:DeprecationWarning:xdist
  # sqlite3 datetime adapter deprecated in Python 3.12, triggered by IPython history
  ignore:.*default datetime adapter.*:DeprecationWarning
